# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$time\
$status\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$dotnet\
$nodejs\
$ruby\
$fill\
$cmd_duration\
$jobs\
$battery\
$line_break\
$character"""

# Inserts a blank line between shell prompts
add_newline = false

[[battery.display]]
threshold = 100
style = 'green dimmed'

[[battery.display]]
threshold = 50
style = 'yellow'

[[battery.display]]
threshold = 20
style = 'bold red'

[character] # The name of the module we are configuring is 'character'
error_symbol = '[>](bold red)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'
success_symbol = '[>](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'
vimcmd_symbol = '[N](bold yellow) '

[cmd_duration]
format = '[\[$duration\]]($style)'
min_time = 0
show_milliseconds = true

[directory]
truncation_length = 3
truncation_symbol = '…/'

[dotnet]
format = '.net[\[$tfm\]]($style) '
symbol = ''

[fill]
symbol = ' '

[git_commit]
disabled = false
only_detached = false
style = 'cyan dimmed'

[git_metrics]
disabled = false

[git_status]
stashed = '↓'
style = 'cyan'

[hostname]
format = '[@$hostname]($style): '
ssh_only = false
ssh_symbol = ''
style = 'blue'

[jobs]
format = '[$symbol$number]($style)'

[nodejs]
format = 'node[\[$version\]](bold green) '

[time]
disabled = false
format = '[\[$time\]]($style) '
style = 'blue'
time_format = '%R'
utc_time_offset = '-5'

[username]
format = '[$user]($style)'
show_always = true
style_user = 'blue'
